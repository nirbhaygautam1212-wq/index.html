<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer Nirbhay Gautam | Secure Gateway</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #f0f2f5; text-align: center; color: #333; }
        
        /* 1. तारक मेहता / Sony Ad पट्टी */
        .top-ads { background: #000; color: #fff; padding: 12px 0; font-size: 14px; border-bottom: 3px solid #ed4956; overflow: hidden; white-space: nowrap; position: sticky; top: 0; z-index: 100; }
        .marquee { display: inline-block; padding-left: 100%; animation: scroll 15s linear infinite; font-weight: bold; }
        @keyframes scroll { 0% { transform: translate(0, 0); } 100% { transform: translate(-100%, 0); } }

        .container { max-width: 400px; margin: 30px auto; background: #fff; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: none; padding: 25px; border: 1px solid #ddd; box-sizing: border-box; }
        .active { display: block; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* ब्रांडिंग */
        .profile-img { width: 85px; height: 85px; background: #003366; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; font-size: 30px; border: 4px solid #0095f6; font-weight: bold; }
        .dev-name { font-size: 20px; font-weight: bold; color: #003366; margin-bottom: 5px; }
        .dev-tag { font-size: 12px; color: #0095f6; font-weight: bold; letter-spacing: 1px; margin-bottom: 15px; }

        /* इनपुट सिस्टम */
        .input-group { text-align: left; margin-bottom: 15px; }
        label { font-size: 12px; font-weight: bold; color: #666; margin-left: 5px; }
        input { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        
        .btn { background: #003366; color: white; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; border-radius: 8px; font-size: 16px; margin-top: 10px; box-shadow: 0 4px #002244; }
        .btn:active { box-shadow: 0 2px #002244; transform: translateY(2px); }

        /* लोडिंग एनीमेशन */
        .loader { border: 5px solid #f3f3f3; border-top: 5px solid #ed4956; border-radius: 50%; width: 55px; height: 55px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #countdown { font-size: 35px; font-weight: bold; color: #003366; margin: 10px 0; }
        .working-text { color: #ed4956; font-weight: bold; letter-spacing: 2px; animation: blink 1s infinite; margin-top: 5px; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        /* इंस्टाग्राम एड कार्ड */
        .insta-card { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); color: white; border-radius: 12px; padding: 15px; margin-top: 20px; text-decoration: none; display: block; }
        
        .progress-box { background: #eee; border-radius: 20px; width: 100%; height: 22px; margin: 15px 0; overflow: hidden; border: 1px solid #ddd; }
        .progress-bar { background: linear-gradient(90deg, #003366, #ed4956); width: 77%; height: 100%; color: white; font-size: 11px; font-weight: bold; display: flex; align-items: center; justify-content: center; }

        .footer-small { font-size: 9px; color: #888; text-align: center; padding: 25px; line-height: 1.6; max-width: 400px; margin: 0 auto; }
    </style>
</head>
<body>

    <div class="top-ads">
        <div class="marquee">📺 SONY ENTERTAINMENT TELEVISION | TMKOC OFFICIAL AD | DEV: NIRBHAY GAUTAM ™®© | 🚀 77% WORK IN PROGRESS</div>
    </div>

    <div id="step1" class="container active">
        <div class="profile-img">NG</div>
        <div class="dev-name">Nirbhay Gautam ™®©</div>
        <div class="dev-tag">OFFICIAL SYSTEMS GATEWAY</div>
        
        <div class="input-group">
            <label>Roll Number</label>
            <input type="number" id="roll" placeholder="अपना रोल नंबर दर्ज करें">
        </div>
        <div class="input-group">
            <label>Application Number</label>
            <input type="number" id="appNum" placeholder="एप्लीकेशन नंबर दर्ज करें">
        </div>
        
        <button class="btn" onclick="startSecurity()">ENTER SYSTEM</button>
    </div>

    <div id="step2" class="container">
        <h3 style="color:#003366; margin: 0;">System Verification</h3>
        <div class="loader"></div>
        <div id="countdown">10</div>
        <div class="working-text">WORKING...</div>
        <p style="font-size: 13px; color: #666; margin-top: 15px;">सुरक्षित तरीके से डेटा प्रोसेस हो रहा है</p>
    </div>

    <div id="step3" class="container">
        <div class="profile-img">NG</div>
        <div class="dev-name">Nirbhay Gautam ™®©</div>
        <div class="progress-box"><div class="progress-bar">77% COMPLETED</div></div>
