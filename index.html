<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCHANA - Nirbhay Gautam™®© NG®</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: #000; color: #fff; overflow: hidden; height: 100vh; }
        
        .bg-container { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: url('https://i.postimg.cc/mD8zYpT9/Indian-Railways-175-Years.jpg'); 
            background-size: cover; background-position: center; 
            animation: bgZoom 20s infinite alternate; z-index: -1; 
        }
        @keyframes bgZoom { from { transform: scale(1); } to { transform: scale(1.1); } }
        
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.9) 100%); z-index: -1; }
        
        .main-ui { height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        
        .box { 
            width: 100%; max-width: 440px; background: rgba(255, 255, 255, 0.08); 
            border: 1px solid rgba(0, 242, 255, 0.3); padding: 40px 30px; border-radius: 30px; 
            display: none; text-align: center; backdrop-filter: blur(25px); 
            box-shadow: 0 25px 50px rgba(0,0,0,0.7); animation: fadeIn 0.6s ease-out; 
        }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        .active { display: block !important; }

        .status-badge {
            background: #ffcc00; color: #000; font-size: 10px; font-weight: bold;
            padding: 5px 12px; border-radius: 20px; display: inline-block;
            margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px;
            animation: blink 1.5s infinite;
        }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        .brand-name { 
            font-size: 50px; font-weight: 900; 
            background: linear-gradient(to bottom, #fff, #00f2ff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: 3px; margin-bottom: 5px; text-transform: uppercase;
        }

        /* आपका नाम चिन्हों के साथ यहाँ है */
        .dev-info { 
            font-size: 13px; color: #00f2ff; letter-spacing: 1px; 
            margin-bottom: 25px; font-weight: bold; text-transform: uppercase;
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
        }

        input { 
            width: 100%; padding: 18px; margin: 15px 0; background: rgba(0,0,0,0.6); 
            border: 1px solid #00f2ff; color: #00f2ff; font-size: 24px; text-align: center; outline: none; 
            letter-spacing: 12px; border-radius: 15px;
        }

        .btn { 
            width: 100%; padding: 18px; margin: 10px 0; background: linear-gradient(45deg, #00f2ff, #0072ff); 
            color: #fff; border: none; font-weight: bold; cursor: pointer; border-radius: 15px; 
            text-transform: uppercase; box-shadow: 0 10px 20px rgba(0,114,255,0.4);
        }
        .btn:active { transform: scale(0.96); }

        .loader-container { width: 100%; height: 5px; background: rgba(255,255,255,0.1); border-radius: 10px; margin: 30px 0; overflow: hidden; }
        .fill { width: 0%; height: 100%; background: #00f2ff; box-shadow: 0 0 15px #00f2ff; transition: width 0.1s linear; }
        
        #error-msg { color: #ff4b4b; font-size: 13px; margin-bottom: 10px; display: none; font-weight: bold; }
    </style>
</head>
<body onclick="initSpeech()">

    <div class="bg-container"></div>
    <div class="overlay"></div>

    <div class="main-ui">
        <div id="step1" class="box active">
            <div class="status-badge">🚧 Work In Progress</div>
            <div class="brand-name">ARCHANA</div>
            <div class="dev-info">Developer: Nirbhay Gautam™®© NG®</div>
            <input type="password" id="secretCode" placeholder="***" maxlength="3" oninput="initSpeech()">
            <div id="error-msg">ACCESS DENIED</div>
            <button class="btn" onclick="processLogin()">INITIALIZE ACCESS</button>
        </div>

        <div id="step2" class="box">
            <div class="brand-name" style="font-size: 30px;">FLEXY</div>
            <div class="loader-container"><div id="bar" class="fill"></div></div>
            <p id="boot-log" style="font-size: 11px; color: #00f2ff; text-transform: uppercase;">Building Assets...</p>
        </div>

        <div id="step3" class="box">
            <div class="status-badge" style="background: #00f2ff;">In Construction</div>
            <h2 style="font-size: 24px; color: #fff; margin-bottom: 5px;">ARCHANA ™®©</h2>
            <div class="dev-info" style="margin-bottom: 30px;">Developer: Nirbhay Gautam™®© NG®</div>
            <button class="btn" onclick="showGallery()">OPEN PEXELS PORTFOLIO</button>
            <button class="btn" style="background:transparent; border:1px solid rgba(255,255,255,0.3);" onclick="location.reload()">TERMINATE SESSION</button>
        </div>
    </div>

    <script>
        let speechReady = false;
        function initSpeech() {
            if(!speechReady) {
                const msg = new SpeechSynthesisUtterance("");
                window.speechSynthesis.speak(msg);
                speechReady = true;
            }
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'hi-IN';
            utterance.rate = 0.95;
            utterance.pitch = 1.0;
            window.speechSynthesis.speak(utterance);
        }

        function processLogin() {
            const codeInput = document.getElementById('secretCode').value;
            const error = document.getElementById('error-msg');

            if (codeInput === "112") {
                error.style.display = 'none';
                document.getElementById('step1').classList.remove('active');
                document.getElementById('step2').classList.add('active');
                
                // आपका बताया हुआ वॉइस मैसेज
                speak("यह अनलॉक हो गया है और इसके डेवलपर निर्भय गौतम फ्रॉम बालाघाट वारासिवनी से हैं।");
                
                runEngineBoot();
            } else {
                error.style.display = 'block';
                speak("गलत कोड");
                document.getElementById('secretCode').value = "";
            }
        }

        function runEngineBoot() {
            let p = 0;
            const bar = document.getElementById('bar');
            const log = document.getElementById('boot-log');
            const msgs = ["ALLOCATING RESOURCES...", "CONSTRUCTING UI...", "VIBES READY!"];
            
            const timer = setInterval(() => {
                p += 2;
                bar.style.width = p + "%";
                if(p % 35 == 0) log.innerText = msgs[Math.floor(p/25) - 1] || "READY";
                if(p >= 100) {
                    clearInterval(timer);
                    setTimeout(() => {
                        document.getElementById('step2').classList.remove('active');
                        document.getElementById('step3').classList.add('active');
                    }, 400);
                }
            }, 50);
        }

        function showGallery() {
            window.open("https://www.pexels.com/@indianrailwayvibes-1595603606", "_blank");
        }
    </script>
</body>
</html>
