<!DOCTYPE html>
<html lang="hi">
<head>
    <script>
        // ==========================================
        // 1. यहाँ अपनी रेल यूनिवर्सिटी की लिंक डालें:
        const MY_GAME_LINK = "अपनी_असली_लिंक_यहाँ_चिपकाएं"; 
        // ==========================================
    </script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAP-7 Mission Control</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Courier New', monospace; background: #000; color: #0f0; overflow: hidden; }
        @media screen and (orientation: portrait) {
            #portrait-warn { display: flex !important; }
            .main-ui { display: none; }
        }
        #portrait-warn { 
            display: none; position: fixed; width: 100%; height: 100%; 
            background: #111; z-index: 9999; flex-direction: column; 
            justify-content: center; align-items: center; text-align: center; color: #ffcc00;
        }
        .main-ui { height: 100vh; display: flex; justify-content: center; align-items: center; }
        .box { 
            width: 90%; max-width: 550px; background: rgba(15, 15, 15, 0.98); border: 2px solid #333; 
            padding: 30px; border-radius: 15px; box-shadow: 0 0 50px rgba(0,255,0,0.1);
            display: none; border-top: 5px solid #ed4956; text-align: center;
        }
        .active { display: block !important; }
        input { 
            width: 100%; padding: 15px; margin: 15px 0; background: #000; 
            border: 1px solid #0f0; color: #0f0; font-size: 24px; text-align: center; outline: none;
            letter-spacing: 8px; border-radius: 8px;
        }
        .btn { 
            width: 100%; padding: 18px; margin: 10px 0; background: #ed4956; 
            color: #fff; border: none; font-weight: bold; cursor: pointer; font-size: 18px;
            border-radius: 10px; transition: 0.2s; text-transform: uppercase;
        }
        .btn-green { background: #28a745; }
        .loader-bar { width: 100%; height: 10px; background: #222; border-radius: 5px; margin: 20px 0; overflow: hidden; }
        .fill { width: 0%; height: 100%; background: #0f0; transition: width 0.1s linear; }
        .download-zone { background: #111; border: 2px dashed #ed4956; padding: 20px; border-radius: 10px; margin-top: 15px; }
    </style>
</head>
<body>

    <div id="portrait-warn">
        <h1 style="font-size: 60px;">🔄</h1>
        <h2>LANDSCAPE MODE</h2>
        <p>सिस्टम के लिए फोन घुमाएं</p>
    </div>

    <div class="main-ui">
        <div id="step1" class="box active">
            <h2 style="color: #ed4956;">WAP-7 ACTIVATION</h2>
            <input type="password" id="secretCode" placeholder="***" maxlength="3">
            <button class="btn" onclick="processLogin()">ACTIVATE SYSTEM</button>
        </div>

        <div id="step2" class="box">
            <h2 style="color: #0f0;">INITIALIZING...</h2>
            <div class="loader-bar"><div id="bar" class="fill"></div></div>
            <p id="boot-log" style="font-size: 13px;">CHECKING SYSTEMS...</p>
        </div>

        <div id="step3" class="box">
            <h2 style="color: #fff;">NIRBHAY GAUTAM ™®©</h2>
            <p style="color: #0f0; font-size: 11px; margin-bottom: 20px;">PILOT STATUS: ONLINE</p>
            <button class="btn btn-green" onclick="showDownload()">START MISSION (BALAGHAT-GONDIA)</button>
            <button class="btn" style="background: #333;" onclick="location.reload()">REBOOT</button>
        </div>

        <div id="step4" class="box">
            <h2 style="color: #ffcc00;">RAIL UNIVERSITY</h2>
            <div class="download-zone">
                <p style="color: #fff; font-size: 15px;">"यह निर्भय की तरफ से बनाया हुआ रेल गेम है, इसे डाउनलोड करें और इसका आनंद लें।"</p>
                <a id="gameLink" href="#" target="_blank" class="btn btn-green" style="display: block; text-decoration: none; margin-top: 20px;">DOWNLOAD APK 📥</a>
            </div>
            <button class="btn" style="background: #333; margin-top: 15px;" onclick="backToPanel()">BACK</button>
        </div>
    </div>

    <script>
        function processLogin() {
            if (document.getElementById('secretCode').value === "112") {
                document.getElementById('step1').classList.remove('active');
                document.getElementById('step2').classList.add('active');
                runEngineBoot();
            } else { alert("गलत कोड!"); }
        }

        function runEngineBoot() {
            let p = 0;
            const bar = document.getElementById('bar');
            const voiceMsg = "वेरिफिकेशन सफल रहा। इसके डेवलपर निर्भय गौतम हैं। मिशन कंट्रोलर तैयार है।";
            const speech = new SpeechSynthesisUtterance(voiceMsg);
            speech.lang = 'hi-IN';
            window.speechSynthesis.speak(speech);

            const timer = setInterval(() => {
                p += 2;
                bar.style.width = p + "%";
                if(p >= 100) {
                    clearInterval(timer);
                    document.getElementById('step2').classList.remove('active');
                    document.getElementById('step3').classList.add('active');
                }
            }, 50);
        }

        function showDownload() {
            document.getElementById('step3').classList.remove('active');
            document.getElementById('step4').classList.add('active');
            document.getElementById('gameLink').href = MY_GAME_LINK;
        }

        function backToPanel() {
            document.getElementById('step4').classList.remove('active');
            document.getElementById('step3').classList.add('active');
        }
    </script>
</body>
</html>
