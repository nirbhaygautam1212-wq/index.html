<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NG-CORE | Final Testing Phase</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; min-height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        
        /* बैकग्राउंड - आपकी दी गई फोटो */
        .bg-container { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: url('https://i.postimg.cc/mD8zYpT9/Indian-Railways-175-Years.jpg'); 
            background-size: cover; background-position: center; 
            animation: bgZoom 20s infinite alternate; z-index: -2; 
        }
        @keyframes bgZoom { from { transform: scale(1); } to { transform: scale(1.1); } }
        
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.95) 100%); z-index: -1; }
        
        /* मुख्य डैशबोर्ड */
        .box { width: 90%; max-width: 500px; background: rgba(255, 255, 255, 0.07); border: 1px solid rgba(0, 242, 255, 0.4); padding: 35px 25px; border-radius: 40px; text-align: center; backdrop-filter: blur(40px); box-shadow: 0 0 60px rgba(0, 242, 255, 0.15); position: relative; }

        /* बीटा और टेस्टिंग टैग */
        .logo-area { position: relative; display: inline-block; margin-bottom: 5px; }
        .system-logo { font-size: clamp(35px, 8vw, 55px); font-weight: 900; background: linear-gradient(45deg, #00f2ff, #fff, #0072ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0 0 20px rgba(0, 242, 255, 0.4); letter-spacing: -2px; }
        
        .version-tag { position: absolute; top: -5px; right: -40px; background: #ffcc00; color: #000; font-size: 9px; font-weight: bold; padding: 2px 7px; border-radius: 4px; text-transform: uppercase; }

        .testing-status { color: #00f2ff; font-size: 10px; font-weight: bold; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 15px; display: block; }

        .dev-tag { font-size: 13px; color: #fff; font-weight: bold; margin-bottom: 15px; opacity: 0.9; }

        /* फोटो प्रीव्यू */
        .photo-preview {
            width: 100%; height: 130px;
            background: url('https://i.postimg.cc/mD8zYpT9/Indian-Railways-175-Years.jpg');
            background-size: cover; background-position: center;
            border-radius: 20px; margin: 10px 0 20px 0;
            border: 1px solid rgba(0, 242, 255, 0.3);
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }

        .insta-id { background: rgba(255,255,255,0.05); border-left: 4px solid #E1306C; padding: 15px; border-radius: 12px; display: flex; align-items: center; justify-content: center; gap: 12px; text-decoration: none; color: #fff; margin-bottom: 10px; font-size: 14px; transition: 0.3s; }
        .insta-id:hover { background: rgba(255,255,255,0.1); transform: scale(1.02); }

        .btn { width: 100%; padding: 18px; margin-top: 10px; background: linear-gradient(45deg, #00f2ff, #0072ff); color: #fff; border: none; font-weight: bold; cursor: pointer; border-radius: 15px; text-transform: uppercase; letter-spacing: 1px; }

        /* फ्यूचर अपडेट्स */
        .future-updates { margin-top: 25px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); text-align: left; }
        .future-title { font-size: 11px; color: #00f2ff; font-weight: bold; margin-bottom: 5px; text-transform: uppercase; }
        .future-text { font-size: 10px; color: #aaa; line-height: 1.4; font-style: italic; }

        #voice-info { font-size: 9px; color: #ffcc00; margin-top: 15px; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; }
    </style>
</head>
<body onclick="startPermanentSystem()">

    <div class="bg-container"></div>
    <div class="overlay"></div>

    <div class="main-ui">
        <div class="box">
            <div class="logo-area">
                <div class="system-logo">NG-CORE</div>
                <div class="version-tag">BETA</div>
            </div>
            <span class="testing-status">Testing Phase Connected</span>
            
            <div class="dev-tag">Developer: Nirbhay Gautam™®© NG®</div>
            
            <div class="photo-preview"></div>
            
            <a href="https://instagram.com/Niiiihu_patel_" target="_blank" class="insta-id"><i class="fab fa-instagram"></i> <span>@Niiiihu_patel_</span></a>
            <a href="https://instagram.com/ni_rbhay_" target="_blank" class="insta-id"><i class="fab fa-instagram"></i> <span>@ni_rbhay_</span></a>

            <button class="btn" onclick="window.open('https://www.pexels.com/@indianrailwayvibes-1595603606', '_blank')">PEXELS 40K+ COLLECTION 📸</button>

            <div class="future-updates">
                <div class="future-title"><i class="fas fa-microchip"></i> Future Log:</div>
                <p class="future-text">आगामी अपडेट्स में कई नए फीचर्स और वेबसाइट टूल्स जोड़े जाएंगे। वर्तमान में यह टेस्टिंग वर्जन 1.0 पर है।</p>
            </div>

            <div id="voice-info">आवाज़ के लिए स्क्रीन टच करें</div>
        </div>
    </div>

    <script>
        let isLive = false;
        let voiceInterval;

        function runAnnouncement() {
            // पुराने सभी स्पीच को क्लियर करें
            window.speechSynthesis.cancel();

            const script = "यह सिस्टम अनलॉक हो गया है और इसके मुख्य डेवलपर निर्भय गौतम हैं। ध्यान दें, यह अभी बीटा वर्जन और टेस्टिंग फेज में है। नीचे दी गई वेबसाइट पर जाने के बाद यदि आपको वॉलपेपर चाहिए, तो तीसरे नंबर के ऑप्शन को दबाएं। वहां आपको इंडियन रेलवे के प्रीमियम वॉलपेपर मिलेंगे। यदि आपको इंडियन रेलवे के वॉलपेपर नहीं चाहिए, तो आप नीचे स्क्रॉल डाउन कर सकते हैं। यहाँ चालीस हजार से भी ज्यादा वॉलपेपर्स उपलब्ध हैं। आगे के अपडेट में यहाँ बहुत सारी नई चीज़ें और फीचर्स जोड़े जाएंगे। अभी का कार्य अंडर कंस्ट्रक्शन और डेवलपमेंट में है।";

            const msg = new SpeechSynthesisUtterance(script);
            msg.lang = 'hi-IN';
            msg.pitch = 0.8; // भारी पुरुष आवाज़
            msg.rate = 0.95; 

            // मेल आवाज़ ढूँढना
            const voices = window.speechSynthesis.getVoices();
            const maleVoice = voices.find(v => (v.name.includes('Male') || v.name.includes('Google हिन्दी')) && v.lang.includes('hi'));
            if(maleVoice) msg.voice = maleVoice;

            // जब बोलना खत्म हो, तो ठीक 30 सेकंड बाद फिर से शुरू करें
            msg.onend = function() {
                console.log("Announcement finished. Restarting in 30s...");
                setTimeout(runAnnouncement, 30000);
            };

            // अगर कोई एरर आए तो तुरंत रिबूट करें
            msg.onerror = function() {
                setTimeout(runAnnouncement, 1000);
            };

            window.speechSynthesis.speak(msg);
            document.getElementById('voice-info').innerText = "SYSTEM LIVE: MALE VOICE LOOP ON";
        }

        function startPermanentSystem() {
            if(!isLive) {
                isLive = true;
                runAnnouncement();
            }
        }

        // वॉइस लोड होने पर तैयार रहना
        window.speechSynthesis.onvoiceschanged = () => {
            if(isLive) runAnnouncement();
        };
    </script>
</body>
</html>
