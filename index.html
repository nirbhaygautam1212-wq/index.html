<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAP-7 | Mission Control</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Courier New', monospace; background: #000; color: #0f0; overflow: hidden; }

        /* लैंडस्केप चेतावनी */
        @media screen and (orientation: portrait) {
            #portrait-warn { display: flex !important; }
            .main-ui { display: none; }
        }

        #portrait-warn { 
            display: none; position: fixed; width: 100%; height: 100%; 
            background: #000; z-index: 9999; flex-direction: column; 
            justify-content: center; align-items: center; text-align: center;
        }

        .main-ui { height: 100vh; display: flex; justify-content: center; align-items: center; }
        
        .box { 
            width: 500px; background: #111; border: 2px solid #333; 
            padding: 30px; border-radius: 10px; box-shadow: 0 0 20px rgba(0,255,0,0.2);
            display: none; 
        }
        .active { display: block; animation: flick 0.1s infinite alternate; }
        @keyframes flick { from { opacity: 0.9; } to { opacity: 1; } }

        input { 
            width: 100%; padding: 10px; margin: 15px 0; background: #000; 
            border: 1px solid #0f0; color: #0f0; font-size: 20px; text-align: center; outline: none;
        }

        .btn { 
            width: 100%; padding: 15px; margin: 10px 0; background: #0f0; 
            color: #000; border: none; font-weight: bold; cursor: pointer; font-size: 16px;
        }
        .btn:hover { background: #00ff00; box-shadow: 0 0 15px #0f0; }
        .btn-red { background: #f00; color: #fff; }

        .status { font-size: 12px; margin-bottom: 10px; color: #888; }
    </style>
</head>
<body>

    <div id="portrait-warn">
        <h1 style="font-size: 50px;">🔄</h1>
        <h2>ROTATE TO LANDSCAPE</h2>
        <p>सिस्टम बूट करने के लिए फोन घुमाएं</p>
    </div>

    <div class="main-ui">
        
        <div id="step1" class="box active">
            <p class="status">UNIT: WAP-7_BALAGHAT_DIV</p>
            <h3>ENTER ENGINE ACTIVATION CODE</h3>
            <input type="password" id="engineCode" placeholder="****">
            <button class="btn" onclick="engageEngine()">ENGAGE PANTOGRAPH (ZPT)</button>
        </div>

        <div id="step2" class="box">
            <h2 id="msg">SYSTEM BOOTING...</h2>
            <div style="height: 5px; background: #222; margin: 20px 0;">
                <div id="bar" style="width: 0%; height: 100%; background: #0f0;"></div>
            </div>
            <p id="boot-log" style="font-size: 12px;">INITIALIZING CAB-1...</p>
        </div>

        <div id="step3" class="box">
            <div style="text-align: center; border-bottom: 1px solid #333; margin-bottom: 20px; padding-bottom: 10px;">
                <h2 style="color: #fff;">WAP-7 MASTER UNIT</h2>
                <p style="font-size: 10px; color: #ffcc00;">PILOT: NIRBHAY GAUTAM ™®©</p>
            </div>
            
            <button class="btn" onclick="window.location.href='YOUR_GAME_URL'">START MISSION (BALAGHAT-GONDIA)</button>
            <button class="btn" onclick="alert('Developer: Nirbhay Gautam\nRoute: Balaghat to Gondia\nTrain: WAP-7 with ICF/LHB')">ABOUT SYSTEM</button>
            <button class="btn btn-red" onclick="location.reload()">REBOOT ENGINE</button>
        </div>

    </div>

    <script>
        function engageEngine() {
            let code = document.getElementById('engineCode').value;
            if(code == "112") { // आपका सीक्रेट कोड यहाँ है
                document.getElementById('step1').classList.remove('active');
                document.getElementById('step2').classList.add('active');
                startBootSequence();
            } else {
                alert("INVALID ENGINE CODE!");
            }
        }

        function startBootSequence() {
            let p = 0;
            let bar = document.getElementById('bar');
            let log = document.getElementById('boot-log');
            let msgs = ["BATTERY VOLTAGE OK...", "PANTOGRAPH UP...", "VIV GI CHECK...", "SIGNAL GREEN...", "SYSTEM READY"];
            
            // --- ENGINE ANNOUNCEMENT ---
            let voiceMsg = "वेरिफिकेशन सफल रहा। इसके डेवलपर निर्भय गौतम हैं और यह वेबसाइट अभी डेवलपिंग फेज में है। इंजन स्टार्ट करने के लिए मास्टर कंट्रोलर तैयार है।";
            let speech = new SpeechSynthesisUtterance(voiceMsg);
            speech.lang = 'hi-IN';
            window.speechSynthesis.speak(speech);

            let timer = setInterval(() => {
                p += 1;
                bar.style.width = p + "%";
                if(p % 20 == 0) log.innerText = msgs[p/20 - 1];
                if(p >= 100) {
                    clearInterval(timer);
                    document.getElementById('step2').classList.remove('active');
                    document.getElementById('step3').classList.add('active');
                }
            }, 50);
        }
    </script>
</body>
</html>
