<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NG-CORE | Male Voice Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: #000; color: #fff; min-height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        
        .bg-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://i.postimg.cc/mD8zYpT9/Indian-Railways-175-Years.jpg'); background-size: cover; background-position: center; animation: bgZoom 20s infinite alternate; z-index: -1; }
        @keyframes bgZoom { from { transform: scale(1); } to { transform: scale(1.1); } }
        
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.95) 100%); z-index: -1; }
        
        .box { width: 90%; max-width: 480px; background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(0, 242, 255, 0.4); padding: 40px 30px; border-radius: 40px; text-align: center; backdrop-filter: blur(35px); box-shadow: 0 0 80px rgba(0, 242, 255, 0.2); animation: fadeIn 1s ease-out; }

        .system-logo { font-size: clamp(45px, 10vw, 65px); font-weight: 900; background: linear-gradient(45deg, #00f2ff, #fff, #0072ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0 0 25px rgba(0, 242, 255, 0.5); letter-spacing: -2px; }
        .dev-tag { font-size: 14px; color: #00f2ff; letter-spacing: 2px; font-weight: bold; margin: 10px 0 30px 0; text-transform: uppercase; }

        .insta-id { background: rgba(255,255,255,0.05); border-left: 4px solid #E1306C; padding: 18px; border-radius: 15px; display: flex; align-items: center; justify-content: center; gap: 15px; text-decoration: none; color: #fff; margin-bottom: 15px; transition: 0.3s; }
        .insta-id:hover { transform: translateY(-3px); background: rgba(255,255,255,0.12); box-shadow: 0 5px 15px rgba(0, 242, 255, 0.2); }

        .btn { width: 100%; padding: 18px; margin-top: 15px; background: linear-gradient(45deg, #00f2ff, #0072ff); color: #fff; border: none; font-weight: bold; cursor: pointer; border-radius: 15px; text-transform: uppercase; letter-spacing: 1px; }

        #voice-status { font-size: 10px; color: #00f2ff; margin-top: 15px; text-transform: uppercase; opacity: 0.7; }
    </style>
</head>
<body onclick="activateSystem()">

    <div class="bg-container"></div>
    <div class="overlay"></div>

    <div class="main-ui">
        <div class="box">
            <div class="system-logo">NG-CORE</div>
            <div class="dev-tag">Nirbhay Gautam™®© NG®</div>
            
            <a href="https://instagram.com/Niiiihu_patel_" target="_blank" class="insta-id">
                <i class="fab fa-instagram"></i>
                <span>@Niiiihu_patel_</span>
            </a>
            <a href="https://instagram.com/ni_rbhay_" target="_blank" class="insta-id">
                <i class="fab fa-instagram"></i>
                <span>@ni_rbhay_</span>
            </a>

            <button class="btn" onclick="window.open('https://www.pexels.com/@indianrailwayvibes-1595603606', '_blank')">EXPLORE WALLPAPERS 📸</button>

            <div id="voice-status">क्लिक करें और आवाज़ शुरू करें</div>
        </div>
    </div>

    <script>
        let isActivated = false;

        function speak() {
            window.speechSynthesis.cancel(); // पुराने स्पीच को साफ़ करें

            const text = "यह अनलॉक हो गया है और इसके डेवलपर निर्भय गौतम हैं। यह कार्य वर्किंग प्रोग्रेस में भी चल रहा है। यह एक वॉलपेपर के लिए सर्वश्रेष्ठ वेबसाइट है, यहाँ आपको हर प्रकार के वॉलपेपर मिल जाएंगे। आगे की सभी प्रक्रियाएं अभी कंस्ट्रक्शन और डेवलपमेंट में हैं।";
            
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'hi-IN';
            
            // बॉयज वॉइस (Male Voice) के लिए सेटिंग्स
            utterance.pitch = 0.8; // पिच कम करने से आवाज़ भारी (Male) हो जाती है
            utterance.rate = 0.9;  // बोलने की रफ़्तार

            // सिस्टम की मेल वॉइस ढूँढना
            const voices = window.speechSynthesis.getVoices();
            const maleVoice = voices.find(v => (v.name.includes('Male') || v.name.includes('Google हिन्दी')) && v.lang.includes('hi'));
            if(maleVoice) utterance.voice = maleVoice;

            // 20 सेकंड के अंतराल के लिए लूप
            utterance.onend = function() {
                setTimeout(speak, 20000);
            };

            window.speechSynthesis.speak(utterance);
            document.getElementById('voice-status').innerText = "SYSTEM ACTIVE: MALE VOICE LOOPING";
        }

        function activateSystem() {
            if(!isActivated) {
                isActivated = true;
                speak();
            }
        }

        // ब्राउज़र के तैयार होने पर आवाज़ें लोड करें
        window.speechSynthesis.onvoiceschanged = () => {
            if(isActivated) speak();
        };
    </script>
</body>
</html>
