<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NG-CORE | Official Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; min-height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        
        .bg-container { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: url('https://i.postimg.cc/mD8zYpT9/Indian-Railways-175-Years.jpg'); 
            background-size: cover; background-position: center; 
            animation: bgZoom 25s infinite alternate; z-index: -2; 
        }
        @keyframes bgZoom { from { transform: scale(1); } to { transform: scale(1.08); } }
        
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.95) 100%); z-index: -1; }
        
        .box { width: 90%; max-width: 480px; background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(0, 242, 255, 0.4); padding: 35px 25px; border-radius: 40px; text-align: center; backdrop-filter: blur(40px); box-shadow: 0 0 50px rgba(0, 242, 255, 0.2); position: relative; }

        .system-logo { font-size: 50px; font-weight: 900; background: linear-gradient(45deg, #00f2ff, #fff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -2px; }
        .version-tag { position: absolute; top: 35px; right: 25px; background: #ffcc00; color: #000; font-size: 10px; font-weight: bold; padding: 2px 8px; border-radius: 5px; }
        .testing-status { color: #00f2ff; font-size: 11px; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px; display: block; }

        .photo-preview { width: 100%; height: 135px; background: url('https://i.postimg.cc/mD8zYpT9/Indian-Railways-175-Years.jpg'); background-size: cover; background-position: center; border-radius: 20px; margin: 15px 0; border: 1px solid rgba(255,255,255,0.2); }

        .btn { width: 100%; padding: 18px; background: linear-gradient(45deg, #00f2ff, #0072ff); color: #fff; border: none; font-weight: bold; border-radius: 15px; cursor: pointer; text-transform: uppercase; margin-top: 10px; }

        #voice-status { font-size: 10px; color: #00f2ff; margin-top: 20px; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; opacity: 0.7; }
    </style>
</head>
<body onclick="handleFirstTouch()">

    <div class="bg-container"></div>
    <div class="overlay"></div>

    <div class="main-ui">
        <div class="box">
            <div class="version-tag">BETA</div>
            <div class="system-logo">NG-CORE</div>
            <span class="testing-status">Testing Phase Connected</span>
            
            <div style="font-size:13px; margin-bottom:15px;">Developer: Nirbhay Gautam™®© NG®</div>
            
            <div class="photo-preview"></div>
            
            <a href="https://instagram.com/Niiiihu_patel_" target="_blank" style="text-decoration:none;"><div style="background:rgba(255,255,255,0.05); color:white; padding:15px; border-radius:12px; margin-bottom:10px; border-left:4px solid #E1306C;">@Niiiihu_patel_</div></a>
            
            <button class="btn" onclick="window.open('https://www.pexels.com/@indianrailwayvibes-1595603606', '_blank')">PEXELS 40K+ COLLECTION 📸</button>

            <div id="voice-status">सिस्टम सक्रिय करने के लिए स्पर्श करें</div>
        </div>
    </div>

    <script>
        let hasAnnounced = false; // यह ट्रैक करेगा कि एक बार बज चुका है या नहीं

        function playOneTimeNotice() {
            window.speechSynthesis.cancel(); // किसी भी अटके हुए स्पीच को साफ़ करें

            const notice = "यह सिस्टम अनलॉक हो गया है और इसके मुख्य डेवलपर निर्भय गौतम हैं। ध्यान दें, यह अभी बीटा वर्जन और टेस्टिंग फेज में है। नीचे दी गई वॉलपेपर की वेबसाइट पर जाने के बाद यदि आपको वॉलपेपर चाहिए, तो तीसरे नंबर के ऑप्शन को दबाएं। वहां आपको इंडियन रेलवे के प्रीमियम वॉलपेपर मिलेंगे। यदि आपको इंडियन रेलवे के वॉलपेपर नहीं चाहिए, तो आप नीचे स्क्रॉल डाउन कर सकते हैं। यहाँ चालीस हजार से भी ज्यादा वॉलपेपर्स उपलब्ध हैं। आगे के अपडेट में यहाँ बहुत सारी नई चीज़ें और फीचर्स जोड़े जाएंगे। अभी का कार्य अंडर कंस्ट्रक्शन और डेवलपमेंट में है।";

            const speech = new SpeechSynthesisUtterance(notice);
            speech.lang = 'hi-IN';
            speech.pitch = 0.85; 
            speech.rate = 0.95; 

            // मेल आवाज़ ढूँढना
            const voices = window.speechSynthesis.getVoices();
            const male = voices.find(v => (v.name.includes('Male') || v.name.includes('Google हिन्दी')) && v.lang.includes('hi'));
            if(male) speech.voice = male;

            window.speechSynthesis.speak(speech);
            document.getElementById('voice-status').innerText = "NOTICE ANNOUNCED";
        }

        function handleFirstTouch() {
            // यदि अभी तक अनाउंसमेंट नहीं हुई है, तो ही चलाएं
            if(!hasAnnounced) {
                hasAnnounced = true; 
                playOneTimeNotice();
            }
        }
    </script>
</body>
</html>
