<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Nirbhay™© NG® | Automation Manager</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #terminal { width: 80%; max-width: 600px; }
        .command { margin-bottom: 10px; border-left: 3px solid #0f0; padding-left: 10px; }
        #dashboard { display: none; text-align: center; border: 2px solid #00ffff; padding: 40px; border-radius: 15px; box-shadow: 0 0 30px #00ffff; background: rgba(0,0,0,0.9); }
        .verified { background: #0095f6; color: #fff; border-radius: 50%; padding: 2px 7px; font-size: 0.6em; vertical-align: middle; margin-left: 5px; }
        .insta-link { display: inline-block; margin-top: 25px; padding: 12px 25px; border: 2px solid #ff00ff; color: #ff00ff; text-decoration: none; border-radius: 5px; font-weight: bold; }
        .insta-link:hover { background: #ff00ff; color: #fff; }
    </style>
</head>
<body>

    <div id="terminal"></div>

    <div id="dashboard">
        <h2 style="color: #fff;">AUTOMATION CORE ACTIVE</h2>
        <div style="font-size: 2.2em; font-weight: bold; color: #00ffff; margin: 20px 0;">
            Nirbhay™© NG® <span class="verified">✓</span>
        </div>
        <p style="color: yellow;">"यह पूरा ऑटोमेशन बिना किसी कोचिंग के <br> मैंने अपने खुद के दम पर तैयार किया है।"</p>
        <p style="border-top: 1px solid #333; padding-top: 15px;">Status: <b>Manager Online</b></p>
        
        <a href="https://instagram.com/nirbhay_gautam_01" class="insta-link">ACCESS INSTAGRAM PANEL</a>
    </div>

    <script>
        const terminal = document.getElementById('terminal');
        const dashboard = document.getElementById('dashboard');
        const logs = [
            "> Connecting to Instagram API...",
            "> Loading Automation Scripts...",
            "> Bypassing System Restrictions...",
            "> Setting up '10th Legends' Manager...",
            "> Verifying Nirbhay™© NG® Identity...",
            "> ACCESS GRANTED."
        ];

        let i = 0;
        function startAutomation() {
            if (i < logs.length) {
                const p = document.createElement('div');
                p.className = 'command';
                p.innerHTML = logs[i];
                terminal.appendChild(p);
                i++;
                setTimeout(startAutomation, 700);
            } else {
                setTimeout(() => {
                    terminal.style.display = 'none';
                    dashboard.style.display = 'block';
                }, 1000);
            }
        }
        startAutomation();
    </script>
</body>
</html>
